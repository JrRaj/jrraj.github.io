<html>
<head>
<style>
.container {
  position: relative;
  width: 100%;
  height: 100%;
}

.container img {
  width: 100%;
  height: 100%;
  margin: 0px;
}

.container .btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  -ms-transform: translate(-50%, -50%);
  border:none;  
  width: 100%;
  height: 100%;
  margin: 0px;
  padding:0px;
  text-align: center;
  opacity: 1;
}

</style>
</head>
<body>

<audio id="myAudio" loop>
  <source src="my_sound.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <button class="btn" id="myButton" onclick="playAudio(); document.getElementById('myButton').style.opacity='0'"><img src="continue_screen.jpg" width="100%" height="100%"></button>
  <img src="scary_anonymous.gif">
</div>

<script>
var x = document.getElementById("myAudio");

function playAudio() {
  x.play();
}
</script>

</body>
</html>
